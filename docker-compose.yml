services:
  postgres:
    image: postgres:16-alpine
    container_name: tams_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tams_db
    ports:
      - "5432:5432"
    volumes:
      - tams_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tams_pgdata:
